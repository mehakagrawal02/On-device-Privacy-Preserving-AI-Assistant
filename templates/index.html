
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Personal Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    :root{
--primary:#2c8ea9;
--primary-hover:#1c6b80;

--background:#638fac;
--card:#ffffff;

--text:#1c1c1c;
--secondary:#6b7280;

--border:#e3e6ea;

--user:#2c8ea9;
--ai:#4caf50;
}

/* ---------- Base ---------- */

body{
font-family:Segoe UI,Roboto,Arial,sans-serif;
margin:0;
background:var(--background);
color:var(--text);
}

/* ---------- Header ---------- */

header{
background:white;
padding:16px 40px;
border-bottom:1px solid var(--border);

display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-weight:550;
color:var(--primary);
font-size:28px;
}

/* ---------- Layout ---------- */
.status{
    font-size: 0.7rem;
}
.dashboard{

display:grid;

grid-template-columns:300px 1fr 300px;

gap:22px;

max-width:1500px;

height: 80vh; 
margin:auto;

padding:22px;

}

.left-panel,
.center-panel,
.right-panel{

background:var(--card);

border-radius:12px;

padding:18px;

border:1px solid var(--border);

display:flex;
min-height:0;
flex-direction:column;

}
.webcam-controls{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

/* only affect buttons inside webcam controls */
.webcam-controls button{
    width: fit-content;
    min-width:0;
}
/* ---------- Chat ---------- */

#chatBox{

flex:1;

background:#fafafa;

border:1px solid var(--border);

border-radius:10px;

padding:16px;

overflow-y:auto;

display:flex;

flex-direction:column;

gap:12px;
scroll-behavior:smooth;

}

/* message wrapper */

#chatBox div{
display:flex;
}

/* message bubble */

#chatBox span{

display:inline-block;

padding:10px 14px;

border-radius:18px;

max-width:75%;

line-height:1.5;

word-break:break-word;

font-size:14px;

}

/* user message */

.user-message-wrapper{
justify-content:flex-end;
}

.user-message-wrapper span{

background:var(--primary);

color:white;

border-top-right-radius:6px;
}

/* assistant message */

.assistant-message-wrapper{
justify-content:flex-start;
}

.assistant-message-wrapper span{

background:#eef2f6;

color:#222;

border-top-left-radius:6px;
}

/* ---------- Inputs ---------- */

input[type="text"],
textarea,
select{

width:80%;

padding:12px 14px;

border-radius:8px;

border:1px solid var(--border);

background:white;

font-size:14px;

box-sizing:border-box;

}

/* file upload fix */

input[type="file"]{

width:100%;

padding:8px;

border-radius:8px;

border:1px solid var(--border);

background:white;

font-size:13px;

}

/* ---------- Button System ---------- */

button{

padding:6px 8px;
width: fit-content;
border-radius:8px;

cursor:pointer;

background:var(--primary);

color:white;

font-size:14px;

font-weight:600;

min-width:0;

transition:0.2s;

}

button:hover{
background:var(--primary-hover);
}

/* ---------- Button Layout ---------- */

.input-group,
.file-upload-group,
.action-row,
.webcam-controls{

display:flex;

gap:12px;

align-items:center;

flex-wrap:wrap;   /* IMPORTANT: prevents sticking */

margin-bottom:14px;

}

/* prevent inputs from pushing buttons */

.input-group input{
flex:1;
min-width:200px;
}
#voiceOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    backdrop-filter: blur(12px);
    background: rgba(0, 0, 0, 0.3);

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:9999;

    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

#voiceOverlay.active{
    opacity:1;
    visibility:visible;
}

/* Mic animation */

.mic-container{
    text-align:center;
}

.mic-circle{
    width:180px;
    height:180px;
    border-radius:50%;
    background: var(--primary);

    display:flex;
    justify-content:center;
    align-items:center;

    transition: transform 0.1s linear;
}

/* Pulse animation */

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(88, 226, 97, 0.7);
    }
    70%{
        transform:scale(1.2);
        box-shadow:0 0 0 25px rgba(88, 226, 97, 0.7);
    }
    100%{
        transform:scale(1);
    }
}

/* Exit button */

#exitVoiceUI{
    margin-top:20px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:white;
    color: var(--primary);
    cursor:pointer;
}
/* ---------- File List ---------- */

#fileList{

list-style:none;

padding:0;

margin-top:10px;

}

#fileList li{

display:flex;

justify-content:space-between;

align-items:center;

gap:10px;

padding:10px;

border-radius:8px;

background:#f4f6f8;

border:1px solid var(--border);

margin-bottom:8px;

}

#fileList a{

text-decoration:none;

color:#333;

word-break:break-all;

flex:1;

}

#fileList button{

background:#e53935;

min-width:70px;

}

/* ---------- Dropdown ---------- */

.settings-wrapper{
position:relative;
}

.settings-dropdown{

position:absolute;

right:0;

top:50px;

background:white;

border:1px solid var(--border);

border-radius:14px;

box-shadow:0 10px 30px rgba(0,0,0,0.08),
        0 2px 6px rgba(0,0,0,0.04);
min-width:240px;

padding:10px 6px;

opacity:0;

visibility:hidden;

transform:translateY(-10px) scale(0.98);

transition:
        opacity 0.25s ease,
        transform 0.25s ease,
        visibility 0.25s;
backdrop-filter: blur(6px); 
}

.settings-dropdown.show{

opacity:1;

visibility:visible;

transform: translateY(0) scale(1);
}
.settings-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;

padding:8px 12px;
}

.settings-row label{
font-size:14px;
color:var(--secondary);
min-width:90px;
}

.settings-row select{
flex:1;
width:auto;
}


/* ---------- Responsive ---------- */

@media(max-width:1100px){

.dashboard{
grid-template-columns:1fr;
}



}
</style>
</head>

<body>

    <div class="mic-container">

<div class="dashboard">
    <!-- LEFT PANEL --> 
    <div class="left-panel"> 
        <h3>Custom Prompt</h3>
        <textarea id="promptBox" rows="2"></textarea>
<button onclick="savePrompt()">Save</button>
        <h3>Documents 📄</h3>

            <button onclick="uploadDocument()">Upload</button>

    </div>
        
    
    <!-- CENTER PANEL --> 
     <div class="center-panel">

        </div>
    </div> 
    <!-- RIGHT PANEL --> 
    <div class="right-panel"> 
        
            
    <!-- <h3>Voice Query</h3>   -->
    <p id="status"></p>      
  <div class="webcam-controls">
    <button id="voiceBtn" onclick="toggleVoice()">🎤 Start Voice</button>
    <h3>Image Description</h3>
        <div class="webcam-controls">

    <script>
    let mediaRecorder;
    let audioChunks = [];
    let keepRunning = true;
    let stream;
    let isVoiceMode = true;
    let listenTimeout = null;
    let requestStartTime = null;
    let isImageMode = false;
    let isProcessingImage = false;

    // --- VAD Configuration ---
    const SILENCE_THRESHOLD = 0.09 ; // Adjust this value (e.g., 0.01 to 0.1)
    const SILENCE_DURATION = 1300;  
    const ANALYSIS_INTERVAL = 100;  // Check every 100ms
    let silenceTimer = 0;
    let recordingActive = false; // Flag to indicate if we have detected speech and started recording

    // --- WEB AUDIO API VAD COMPONENTS ---
    let audioContext;
    let analyser;
    let scriptProcessor;

async function loadVoices() {
    const res = await fetch("/get_tts_voices");
    const data = await res.json();

    const select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    data.available.forEach(voice => {
        const opt = document.createElement("option");
        opt.value = voice;
        opt.textContent = voice;
        if (voice === data.selected) {
            opt.selected = true;
        }
        select.appendChild(opt);
    });
}

loadVoices();
document.getElementById("userInput").addEventListener("keypress", function(e){
if(e.key === "Enter"){
askModel();
}
});
let isListening = false;
function toggleVoice() {
    const btn = document.getElementById("voiceBtn");
    const overlay = document.getElementById("voiceOverlay");
    if (!isListening) {
        startVoice();
        btn.textContent = "🛑 Stop Voice";
        isListening = true;
        overlay.classList.add("active");   // SHOW VOICE UI
    } else {
        stopListeningLoop();
        btn.textContent = "🎤 Start Voice";
        isListening = false;
        stopSpeaking(); // Stop any ongoing TTS
        overlay.classList.remove("active"); // HIDE VOICE UI
    }
}

document.getElementById("exitVoiceUI").addEventListener("click", () => {
    document.getElementById("voiceOverlay").classList.remove("active");
});
function startVoice(){
keepRunning = true;
isVoiceMode = true;
setupMicrophone();

}
    async function setupMicrophone() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: {
                echoCancellation: true, 
                noiseSuppression: true 
            } });
            console.log("Microphone access granted.");
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 1024; 
            
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = onAudioProcess;

            startListeningLoop();
        } catch (err) {
            console.error("Microphone access denied:", err);
            document.getElementById("status").textContent = "❌ Microphone access denied.";
            
        }
    }
   async function loadPrompt() {
    const res = await fetch("/get_prompt");
    const data = await res.json();
    document.getElementById("promptBox").value = data.prompt;
}

loadPrompt();
async function savePrompt() {
    const prompt = document.getElementById("promptBox").value;

    await fetch("/set_prompt", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
    });

    alert("Prompt updated!");
}
    function stopListeningLoop() {
        keepRunning = false;
        isVoiceMode = false;
        if (listenTimeout){
            clearTimeout(listenTimeout);
             listenTimeout = null;
        } 
            
        if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        document.getElementById("status").textContent = "";
        if (analyser) analyser.disconnect();
        // Cleanup audio context resources
        if (scriptProcessor) {
        scriptProcessor.disconnect();
        scriptProcessor.onaudioprocess = null;
    }
        
    if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
    }
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        recordingActive = false;
        silenceTimer = 0;
    }
    document.addEventListener('DOMContentLoaded', function() {
    const settingsBtn = document.getElementById('settingsBtn');
    const dropdown = document.getElementById('settings-dropdown');
    const body = document.body;

    settingsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('show');
        body.classList.toggle('settings-open');
        loadWakeWords();  
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function() {
        dropdown.classList.remove('show');
        body.classList.remove('settings-open');
    });

    dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });
});

    // VAD Logic Handler
    function onAudioProcess(event) {
        if (!keepRunning || !isVoiceMode) return;

        // Get the audio data buffer
        const buffer = event.inputBuffer.getChannelData(0);
        let maxVolume = 0;
        
        // Calculate max amplitude (volume) in the buffer
        for (let i = 0; i < buffer.length; i++) {
            maxVolume = Math.max(maxVolume, Math.abs(buffer[i]));
        }
        const mic = document.querySelector(".mic-circle");

if (mic) {
    // Normalize volume (tweak multiplier if needed)
    let scale = 1 + (maxVolume * 3); 

    // Clamp scale (so it doesn't explode)
    scale = Math.min(Math.max(scale, 1), 2.2);

    mic.style.transform 
    = `scale(${scale})`;
}
if (maxVolume < SILENCE_THRESHOLD) {
    mic.style.transform = "scale(1)";
    mic.style.boxShadow = "0 0 10px rgba(44,142,169,0.3)";
}
if (maxVolume < SILENCE_THRESHOLD) {
    mic.style.transform = "scale(1)";
    mic.style.boxShadow = "0 0 10px rgba(44,142,169,0.3)";
}
mic.style.boxShadow = `0 0 ${50 + maxVolume * 60}px rgba(44,142,169,${0.3 + maxVolume})`;
        // --- VAD DECISION ---
        if (maxVolume > SILENCE_THRESHOLD) {
            // SPEECH DETECTED
            silenceTimer = 0;
            if (!recordingActive) {
                // START RECORDING on first speech detection
                recordingActive = true;
                startMediaRecorder();
                document.getElementById("status").textContent = "🗣️ Speaking";
                
            }
        } else {
            // SILENCE DETECTED
            if (recordingActive) {
                silenceTimer += (event.inputBuffer.duration * 1000); // Add duration of the buffer
                
                if (silenceTimer >= SILENCE_DURATION) {
                    // STOP RECORDING: Silence limit reached
                    console.log("Stopping recording due to silence.");
                    stopMediaRecorder();
                    
                    return; // Stop processing further chunks until the next loop starts
                }
            }
        }
    }
    isVoiceMode = false;
    // Function to start the MediaRecorder, called only when speech is first detected
    function startMediaRecorder() {
        if (mediaRecorder && mediaRecorder.state === 'recording') return;
        
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };
        
        mediaRecorder.onstop = () => {
            if (!keepRunning) return; 
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            sendAudioToServer(audioBlob, "/check_wake_word");
        };

        mediaRecorder.start();
    }

    // The main listening loop now simply resets the state and waits for the next command
    function startListeningLoop() {
        if (!keepRunning) {
            document.getElementById("status").textContent = "Listening is paused.";
            
            return;
        }

        
        document.getElementById("status").textContent = "No Speech Detected. Waiting for command...";
        
        
        // Reset VAD state for the next command
        recordingActive = false;
        silenceTimer = 0;
        
        // The VAD logic in onAudioProcess will start/stop the recorder
    }
    
    // --- OLLAMA STATUS CHECKING ---
    let isOllamaRunning = false;
    const ollamaBtn = document.getElementById("ollamaStatusBtn");
    function updateOllamaButton(status) {
        ollamaBtn.classList.remove('running', 'stopped');
        if (status === 'running') {
            isOllamaRunning = true;
            ollamaBtn.classList.add('running');
            ollamaBtn.innerText = "Ollama: Running (Click to Stop)";
        } else if (status === 'stopped') {
            isOllamaRunning = false;
            ollamaBtn.classList.add('stopped');
            ollamaBtn.innerText = "Ollama: Stopped (Click to Start)";
        } else {
            isOllamaRunning = false;
            ollamaBtn.innerText = "Ollama: Status Unknown";
        }
    }

    async function checkOllamaStatus() {
        try {
            const response = await fetch('/ollama_status');
            const data = await response.json();
            updateOllamaButton(data.status);
        } catch (error) {
            console.error("Failed to check Ollama status:", error);
            updateOllamaButton('unknown');
        }
    }
    async function toggleOllama() {
        ollamaBtn.disabled = true; 
        ollamaBtn.innerText = isOllamaRunning ? "Stopping..." : "Starting...";

        const action = isOllamaRunning ? 'stop' : 'start';
        const endpoint = `/ollama_control?action=${action}`;
        try {
            const response = await fetch(endpoint, { method: 'POST' });
            const data = await response.json();

            if (data.status === 'success') {
                // Wait a moment for the server process to settle before checking again
                setTimeout(checkOllamaStatus, 2000); 
            } else {
                alert(`Ollama failed to ${action}: ${data.error || 'Unknown error'}`);
                checkOllamaStatus(); // Revert to previous state
            }
        } catch (error) {
            console.error(`Error controlling Ollama: ${error}`);
            alert(`Communication error: Could not connect to backend to ${action} Ollama.`);
            checkOllamaStatus(); // Revert to previous state
        } finally {
            ollamaBtn.disabled = false;
        }
    }

    // --- WEBCAM/IMAGE DESCRIPTION ---
    let webcamStream = null;
    let cameraOn = false;

function toggleCamera() {
    const btn = document.getElementById("camBtn");

    if (!cameraOn) {
        startWebcam();
        btn.textContent = "🛑 Stop Camera";
        cameraOn = true;
    } else {
        stopWebcam();
        const imageResponseContainer = document.getElementById("imageDescriptionResponse");
        imageResponseContainer.innerHTML = "";
        btn.textContent = "📸 Start Camera";
        cameraOn = false;
    }
}
    function startWebcam() {
            if (webcamStream) return;

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            webcamStream = stream;
            const video = document.getElementById("webcamVideo");
            video.srcObject = stream;
            video.play();
            document.getElementById("imageStatus").innerText = "";
        })
        .catch(err => {
            console.error("Camera error:", err);
        });
    }
    function stopWebcam() {
    if(!webcamStream) return;
    if (webcamStream) {
        webcamStream.getTracks().forEach(track => track.stop());
        webcamStream = null;
    }

    const video = document.getElementById("webcamVideo");
    video.srcObject = null;
    document.getElementById("imageStatus").innerText = "";
}
    function captureAndDescribe() {
      if (!webcamStream || isProcessingImage) return;
        isProcessingImage = true;
        
        const imageResponseContainer = document.getElementById("imageDescriptionResponse");
        imageResponseContainer.innerHTML = "";
            
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('webcamCanvas');
        const context = canvas.getContext('2d');
        canvas.width = 240;
        canvas.height = 240;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        video.style.display = "none";
    canvas.style.display = "block";
        webcamStream.getTracks().forEach(track => track.stop());
    webcamStream = null;
        canvas.toBlob(blob => {
            if (blob) {
                sendImageForDescription(blob);
            } else {
                 releaseCamera();
            }
        }, 'image/jpeg', 0.9);
    }

    function sendImageForDescription(imageBlob) {
        const promptText = document.getElementById('imagePrompt').value;
        document.getElementById('imageStatus').innerText = "🚀 Sending image for description...";
        const captureBtn = document.querySelector('button[onclick="captureAndDescribe()"]');
        const formData = new FormData();
        formData.append("image", imageBlob, "captured_image.jpg");
        formData.append("prompt",
    promptText.trim() || "Describe this image in detail.");

        fetch('/describe_image', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(d => {
            const imageResponseContainer = document.getElementById("imageDescriptionResponse");
            document.getElementById('imageStatus').innerText = "✅ Description complete.";
            if (d.response) {
                imageResponseContainer.innerHTML = d.response;
                releaseCamera();
            } else {
            imageResponseContainer.innerText = "Error: " + (d.error || "No response received from model.")
            releaseCamera();
            }
        })
        .catch(err => {
            console.error("Error describing image:", err);
            releaseCamera();
            document.getElementById('imageStatus').innerText = "❌ Failed to connect to server for description.";
        });
    }
    function releaseCamera() {
    const captureBtn = document.getElementById("captureBtn");
    const video = document.getElementById("webcamVideo");
    const canvas = document.getElementById("webcamCanvas");
    captureBtn.disabled = false;
    captureBtn.innerText = "Capture";

    canvas.style.display = "none";
    video.style.display = "block";

    isProcessingImage = false;


    startWebcam(); // restart camera
}

    // --- AUDIO SENDING AND PROCESSING  ---
    function sendAudioToServer(audioBlob, route) {
        
        document.getElementById("status").textContent = "Getting Your Response";

        const formData = new FormData();
        formData.append("audio_file", audioBlob, "recorded.webm");
        requestStartTime = performance.now();
        fetch(route, { method: "POST", body: formData })
            .then(res => res.json())
            .then(data => {
                const transcription = data.transcription || "";
                const timeTaken = ((performance.now() - requestStartTime) / 1000).toFixed(2);
                
                
                if (transcription === "") {
                    document.getElementById("status").textContent = "👂 Just listening...";
                    if (keepRunning) {
                        listenTimeout = setTimeout(startListeningLoop, 500);
                        return;
                    }
                    
                }
                
                if(!data.wake_word_detected) {
                    document.getElementById("status").textContent = "👂 Just listening...";
                    
                    if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 500);
}
                    return;
                }

                // If wake word is detected and response exists
                if (isVoiceMode && data.response !== undefined) {
                    appendMessage("user", transcription);
               
                    appendMessage("assistant", data.response);
                    appendResponseTime(timeTaken);
                    if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 2000);
}
                    
                } else if (!isVoiceMode && data.response !== undefined) {
                    
                    if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 500);
    return;
}
                }

                if (data.stop_detected) {
                    keepRunning = true;
                    
                    document.getElementById("status").textContent = "🛑 Stopped. Listening again…";
                    if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 500);
    return;
}
                } else {
                    document.getElementById("status").textContent = "✅ Ready for your next command.";
                    if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 500);
    return;
}
                }
            })
            .catch(err => {
                console.error("Error sending audio:", err);
                document.getElementById("status").textContent = "❌ Error: " + err.message;
                if (keepRunning) {
    listenTimeout = setTimeout(startListeningLoop, 500);
    return;
}
            });
    }
    function setModel() {
    const selectedModel = document.getElementById("modelSelect").value;

    fetch("/set_ollama_model", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ model_name: selectedModel })
    })
    .then(response => response.json())
    .then(data => {
        console.log("Model successfully set to:", data.selected_model);
    })
    .catch(error => {
        console.error("Failed to set model globally:", error);
    });
}
document.addEventListener('DOMContentLoaded', () => {
    setModel(); // Set the currently selected model on load
});
    // --- FILE/DOCUMENT/TEXT MODE FUNCTIONS ---
    function rememberText() {
        let userInput = document.getElementById("rememberInput").value;
        if (!userInput.trim()) { alert("Please enter some text to remember!"); return; }
        fetch('/remember', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: userInput })
        })
        .then(r => r.json())
        .then(d => { document.getElementById("rememberResponse").innerText = d.message || "Error saving text!"; })
        .catch(() => { document.getElementById("rememberResponse").innerText = "Failed to save text."; });
    }
    function appendResponseTime(seconds) {
    const chatBox = document.getElementById("chatBox");
    const timeDiv = document.createElement("div");
    timeDiv.style.fontSize = "0.8rem";
    timeDiv.style.color = "#9e9e9e";
    timeDiv.style.marginLeft = "10px";
    timeDiv.innerText = `⏱ Response time: ${seconds} s`;
    chatBox.appendChild(timeDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

    function fetchUploadedFiles() {
        fetch("/list_documents")
            .then(r => r.json())
            .then(data => {
                const fileList = document.getElementById("fileList");
                fileList.innerHTML = "";
                (data.files || []).forEach(file => {
                    const li = document.createElement("li");
                    const link = document.createElement("a");
                    link.href = `/uploads/${encodeURIComponent(file)}`;
                    link.innerText = file; link.target = "_blank";
                    const del = document.createElement("button");
                    del.innerHTML = "Delete"; del.style.marginLeft = "10px";
                    del.onclick = () => { if (confirm(`Delete ${file}?`)) deleteFile(file); };
                    li.appendChild(link); li.appendChild(del);
                    fileList.appendChild(li);
                });
            })
            .catch(console.error);
    }//🗑️
    function deleteFile(filename) {
        fetch("/delete_document", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filename })
        })
        .then(r => r.json())
        .then(data => { alert(data.message || data.error); fetchUploadedFiles(); })
        .catch(() => alert("Failed to delete the file."));
    }

    function clearFile() {
        const fileInput = document.getElementById("docInput");
        fileInput.value = '';
        document.getElementById("rememberResponse").innerText = "File deselected.";
    }

    function uploadDocument() {
        const fileInput = document.getElementById("docInput");
        const file = fileInput.files[0];
        if (!file) { alert("Please select a file to upload."); return; }
        const ext = file.name.toLowerCase().split('.').pop();
        if (!['pdf','docx'].includes(ext)) { alert("Please upload a valid PDF or DOCX file."); return; }

        const formData = new FormData();
        formData.append("file", file);
        fetch("/upload_document", { method: "POST", body: formData })
            .then(r => r.json())
            .then(d => { if (d.message) {
        document.getElementById("rememberResponse").innerText = "File uploaded successfully";
        fetchUploadedFiles();  // refresh list instantly
        document.getElementById("docInput").value = ""; // clear input
    } else {
        document.getElementById("rememberResponse").innerText = d.error;
    } })
            .catch(() => { document.getElementById("rememberResponse").innerText = "Failed to upload."; });
    }
    async function loadWakeWords() {
    const res = await fetch("/get_wake_words");
    const data = await res.json();

    const select = document.getElementById("wakeWordSelect");

    select.innerHTML = "";

    data.available.forEach(word => {
        const option = document.createElement("option");
        option.value = word;
        option.textContent = word;

        if (word === data.selected) {
            option.selected = true;
        }

        select.appendChild(option);
    });
}
    function askModel() {
        let userInput = document.getElementById("userInput").value;
        let selectedModel = document.getElementById("modelSelect").value;
        if (!userInput.trim()) { alert("Please enter a question!"); return; }
        appendMessage("user", userInput);
        document.getElementById("userInput").value = "Asking..."; // Show processing status
        requestStartTime = performance.now();
        fetch(`/askmodel?text=${encodeURIComponent(userInput)}&model=${encodeURIComponent(selectedModel)}`)
            .then(r => r.json())
            .then(d => {
                let response = d.response || "No response received";
                const timeTaken = ((performance.now() - requestStartTime) / 1000).toFixed(2);
                
                appendMessage("assistant", response);
                appendResponseTime(timeTaken);
                document.getElementById("userInput").value = ""; // Clear input after successful query
            })
            .catch(() => { 
                
                document.getElementById("userInput").value = userInput; // Restore input on error
            });
    }
    
function stopMediaRecorder() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
    }
    recordingActive = false;
    silenceTimer = 0;
    
}
    function stopSpeaking() {
        fetch('/stop_tts', {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => console.log(data.message))
        .catch(error => console.error("Error stopping speech:", error));
    }
    function changeWakeWord() {
    const new_word = document.getElementById("wakeWordSelect").value;

    fetch("/set_wake_word", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wake_word: new_word })
    })
    .then(res => res.json())
    .then(data => {
        addToChat("ai", "Wake word updated to: " + data.selected);
    });
}
    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const msgWrapper = document.createElement("div"); // Outer container (for alignment)
        const msgContent = document.createElement("span"); // Inner bubble (for background/shape)
        
        let htmlText = text;
        htmlText = htmlText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        htmlText = htmlText.replace(/\n/g, '<br>');

        if (sender === "user") {
            msgWrapper.classList.add("user-message-wrapper");
        msgContent.innerHTML = `<span class="user-message">You:</span> ${htmlText}`;
        } else {
           msgWrapper.classList.add("assistant-message-wrapper");
        msgContent.innerHTML = `<span class="assistant-message">Response:</span> ${htmlText}`;
        }
        
        msgWrapper.appendChild(msgContent);
        chatBox.appendChild(msgWrapper);
        
        // Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    document.getElementById("voiceSelect").addEventListener("change", async function () {
    const voice = this.value;

    await fetch("/set_tts_voice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ voice })
    });
});
    window.onload = function () {
        checkOllamaStatus();
        fetchUploadedFiles();
        loadWakeWords();
        
        
    };
</script>
