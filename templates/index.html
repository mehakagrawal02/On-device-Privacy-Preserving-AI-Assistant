<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flask AI Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ------------------- Base & Typography ------------------- */
    :root {
        /* Colors */
        --primary-color: #2c8ea9; /* Teal/Blue for actions */
        --primary-hover: #1c6b80;
        --background-color: #121212; /* Deeper, modern dark background */
        --card-background: #1e1e1e; /* Background for containers/cards */
        --text-color: #e0e0e0; /* Light gray for main text */
        --secondary-text-color: #b0b0b0; /* Lighter gray for secondary text */
        --border-color: #333333; /* Subtle border color */
        --success-color: #4CAF50;
        --error-color: #F44336;
        --warning-color: #ffc107;
        --user-color: #4fc3f7;
        --ai-color: #a5d6a7;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background: var(--background-color);
        color: var(--text-color);
        line-height: 1.6;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto; /* Header, Main Content, Footer (if any) */
    }

    /* ------------------- Header & Fixed Controls ------------------- */
    header {
        background: #191919;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    h1 {
        color: var(--primary-color);
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 1px;
        margin: 0;
    }
    
    .header-controls {
        display: flex;
        gap: 10px;
    }
    
    /* ------------------- Main Content Layout ------------------- */
    .app-container {
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        flex-grow: 1; /* Allows the container to take up vertical space */
    }

    .main-content-wrapper {
        width: 100%;
        max-width: 900px; /* Central container max width */
        padding: 0 20px;
    }

    /* ------------------- Chat Box Style ------------------- */
    #chatBox {
        background: var(--card-background);
        border: 1px solid var(--border-color);
        padding: 10px;
        border-radius: 12px;
        height: 380px; /* Increased height for better chat view */
        overflow-y: auto;
        margin-bottom: 20px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    
    #chatBox div {
        margin-top: 10px ;
        margin-bottom: 2px;
        padding: 5px 0;
        border-bottom: 1px dotted #2b2b2b;
        display: flex;
        justify-content: flex-start;
    }
    #chatBox div > span { 
    /* Use a standard block/inline-block to contain the text */
    display: inline-block;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 80%; /* Ensure messages don't span the whole width */
    word-wrap: break-word;
    white-space: normal; 
}
 #chatBox div > span + span, #chatBox div > span + br + span, #chatBox div > span {
    /* Use a standard block/inline-block to contain the text */
    display: inline-block;
    padding: 10px 15px;
    border-radius: 20px;
    max-width: 80%; /* Ensure messages don't span the whole width */
    word-wrap: break-word;
    white-space: normal; /* Override pre-wrap for better bubble flow */
}

/* AI Message Bubble (Left-aligned) */
.assistant-message-wrapper {
    justify-content: flex-start !important; /* Ensure left alignment */
}
.assistant-message-wrapper > span {
    background-color: #383838; /* Dark background for AI bubble */
    color: var(--ai-color);
    border-top-left-radius: 5px; /* Sharp corner on the align side */
}

/* User Message Bubble (Right-aligned) */
.user-message-wrapper {
    /* This overrides the default flex-start and moves the entire message to the right */
    justify-content: flex-end !important; 
}
.user-message-wrapper > span {
    background-color: var(--primary-color); /* Primary color for user bubble */
    color: #fff;
    border-top-right-radius: 5px; /* Sharp corner on the align side */
}
    
    /* Styling for the messages appended by JavaScript */
    .user-message {
        color: var(--user-color);
        font-weight: 600;
    }
    
    .assistant-message {
        color: var(--ai-color);
        font-weight: 600;
    }


    /* ------------------- Headings ------------------- */
    h3 {
        color: var(--secondary-text-color);
        border-bottom: 1px solid #2b2b2b;
        padding-bottom: 1px;
        margin-top: 30px;
        margin-bottom: 15px;
        font-weight: 400;
    }


    /* ------------------- Inputs & Buttons ------------------- */
    input[type="text"], input[type="file"], textarea, select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid var(--border-color);
        background-color: #2b2b2b; /* Slightly lighter input background */
        color: var(--text-color);
        border-radius: 8px;
        box-sizing: border-box;
        transition: border-color 0.3s, box-shadow 0.3s;
        font-size: 1rem;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
        border-color: var(--primary-color);
        outline: none;
        box-shadow: 0 0 0 3px rgba(44, 142, 169, 0.3);
    }

    button {
        padding: 10px 20px;
        background: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-left: 0; /* Removed default margin */
        transition: background 0.3s ease, transform 0.1s;
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
    }

    button:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
    }
    
    /* Utility Classes / Grouping */
    .input-group, .file-upload-group, .action-row, .webcam-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .input-group input[type="text"], .input-group input[type="file"], .input-group select {
        margin: 0;
        flex-grow: 1;
    }
    
    .input-group label {
        white-space: nowrap;
    }

    /* ------------------- Response & Status ------------------- */
    #transcription, #response, #response-voice {
        min-height: 50px;
        padding: 15px;
        margin-top: 10px;
        background: var(--card-background);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-color);
        word-wrap: break-word;
        white-space: pre-wrap;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
        display: none;
    }

    #transcription {
        color: var(--secondary-text-color);
        font-style: italic;
        display: none;
    }

    #transcription strong {
        color: var(--text-color);
        font-style: normal;
        display: none;
    }
    
    #status {
        font-size: 1.1rem;
        margin-top: 10px;
        color: var(--secondary-text-color);
        padding: 10px 0;
    }
    
    #rememberResponse, #imageStatus { 
        margin-top: 15px; 
        color: var(--warning-color); 
        font-weight: 600; 
        padding-left: 10px;
    }

    /* ------------------- File List ------------------- */
    ul#fileList {
        list-style: none;
        padding: 0;
        margin-top: 10px;
    }

    ul#fileList li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        padding: 8px 10px;
        background: #252525;
        border-radius: 4px;
        border-left: 3px solid var(--primary-color);
    }

    ul#fileList li a {
        text-decoration: none;
        color: var(--text-color);
        flex-grow: 1;
        transition: color 0.3s;
    }

    #fileList button {
        background: var(--error-color); 
        padding: 4px 8px;
        margin-left: 15px;
    }

    /* ------------------- Voice Mode Indicators (Positioning adjusted for centralization) ------------------- */
    #countdown, #mic-indicator {
        position: fixed;
        right: 10%;
        transform: translateX(50%);
        z-index: 10;
    }

    #countdown {
        top: 100px;
        right: 150px;
        font-size: 6rem;
        font-weight: 900;
        color: #ffeb3b;
        text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffeb3b;
        animation: fadeScale 1.5s infinite alternate;
    }

    @keyframes fadeScale {
        0%   { transform: translateX(50%) scale(0.9); opacity: 0.8; }
        100% { transform: translateX(50%) scale(1.1); opacity: 1; }
    }

    #mic-indicator {
        top: 220px;
        font-size: 6rem;
        color: #ffeb3b;
        /* animation: pulse 1.5s infinite; */
     
    }
    #Name {
        position: fixed;
        top: 750px;
        left: 20px;
        font-size: 1.2rem;
        font-weight: 10;
        color: rgba(255, 255, 255, 0.355);
        padding: 8px 12px;
    }
    
    @keyframes pulse { 
        0%{transform: translateX(50%) scale(1);opacity:1} 
        50%{transform: translateX(50%) scale(1.1);opacity:.8} 
        100%{transform: translateX(50%) scale(1);opacity:1} 
    }
    .settings-wrapper {
    position: relative;
    display: inline-block;
}

.settings-btn {
    background: var(--primary-color);
    padding: 12px 20px;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.settings-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--card-background);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    min-width: 220px;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    padding: 5px 0;
}

.settings-dropdown.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.dropdown-item {
    padding: 8px 15px;
    border-bottom: 1px solid var(--border-color);
}

.dropdown-item:last-child {
    border-bottom: none;
}
#image-only-container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

#image-only-container h1 {
    text-align: center;
    color: var(--primary-color);
}

.dropdown-item button {
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    font-size: 0.9rem;
    justify-content: flex-start;
}

.model-select-item {
    padding: 12px 15px !important;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.model-select-item select {
    font-size: 0.9rem;
}

/* Close dropdown when clicking outside */
.settings-dropdown.show ~ button:focus + .settings-dropdown,
body.settings-open .settings-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

    
    /* ------------------- Webcam/Image Section ------------------- */
    #webcamVideo {
        display: block;
        margin: 15px auto;
        border: 2px solid var(--primary-color);
        border-radius: 8px;
        background-color: black;
    }

    .webcam-controls button {
        flex-grow: 1;
        margin-top: 0;
    }
    
    .webcam-controls input {
        margin-bottom: 0;
    }
    
    .webcam-controls > :not(input[type="text"]) {
        flex-basis: 48%; /* Split the buttons into roughly two columns */
    }
    
    .webcam-controls input[type="text"] {
        flex-basis: 100%; /* Make prompt full width */
    }


    /* ------------------- Responsive Adjustments ------------------- */
    @media (max-width: 950px) {
        .app-container {
            padding: 20px 10px;
        }
        
        /* Center content on smaller screens but less padding */
        .main-content-wrapper {
            padding: 0 10px;
        }

        header {
            flex-direction: column;
            align-items: flex-start;
            padding: 15px 20px;
            position: relative; /* Unstick header on mobile */
        }
        
        h1 {
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .header-controls {
            width: 100%;
            flex-direction: column;
        }
        
        .header-controls button {
            width: 100%;
        }

        /* Stack input groups on smaller screens */
        .input-group, .file-upload-group, .webcam-controls {
            flex-direction: column;
            align-items: stretch;
        }

        .input-group button, .file-upload-group button, .webcam-controls button {
            width: 100%;
            margin-top: 5px;
        }
        
        .webcam-controls > :not(input[type="text"]) {
            flex-basis: 100%;
        }
        
        #countdown {
            top: 50%;
            right: 50%;
            color: black;
            display: none !important;
        } 
        #mic-indicator {
            top: 55%;
            right: 50%;
        }
    }
</style>
</head>

    <div id="mic-indicator" style="display: none;"><i class="fas fa-microphone"></i></div>
    <script>
    let mediaRecorder;
    let audioChunks = [];
    let keepRunning = true;
    let stream;
    let isVoiceMode = true;
    let listenTimeout = null;
    let requestStartTime = null;

    // --- VAD Configuration ---
    const SILENCE_THRESHOLD = 0.1; // Adjust this value (e.g., 0.01 to 0.1)
    const SILENCE_DURATION = 1500;  
    const ANALYSIS_INTERVAL = 100;  // Check every 100ms
    let silenceTimer = 0;
    let recordingActive = false; // Flag to indicate if we have detected speech and started recording

    // --- WEB AUDIO API VAD COMPONENTS ---
    let audioContext;
    let analyser;
    let scriptProcessor;

    function switchToVoiceMode() {
        const voiceContainer = document.getElementById("voice-mode-container");
        const textContainer = document.getElementById("text-mode-container");
        const micIndicator = document.getElementById("mic-indicator");
        const modeToggleBtn = document.getElementById("modeToggleBtn");

        isVoiceMode = true;
        textContainer.style.display = "none";
        voiceContainer.style.display = "block";
        micIndicator.style.display = "block";
        modeToggleBtn.innerText = "Switch to Text Mode";
        keepRunning = true;
        setupMicrophone();
        document.getElementById("chatBox").innerHTML = "";
    }

    function switchToTextMode() {
        const voiceContainer = document.getElementById("voice-mode-container");
        const textContainer = document.getElementById("text-mode-container");
        const micIndicator = document.getElementById("mic-indicator");
        const modeToggleBtn = document.getElementById("modeToggleBtn");
        const chatBox = document.getElementById("chatBox");

        stopListeningLoop(); // Stop VAD and microphone cleanup

        isVoiceMode = false;
        document.getElementById("response").textContent = "";
        voiceContainer.style.display = "none";
        textContainer.style.display = "block";
        micIndicator.style.display = "none";
        modeToggleBtn.innerText = "Switch to Voice Mode";
        keepRunning = false;
        chatBox.innerHTML = "";
    }
    
    function enterImageMode() {
   
    stopSpeaking();
    stopListeningLoop();

    isVoiceMode = false;

    
     document.querySelector(".main-content-wrapper").style.display = "none";
    document.getElementById("image-only-container").style.display = "block";

    
    document.getElementById("chatBox").innerHTML = "";
    document.getElementById("status").textContent = "";
}
function exitImageMode() {
    document.getElementById("image-only-container").style.display = "none";
     document.querySelector(".main-content-wrapper").style.display = "block";
    
    switchToTextMode();
}


    function toggleMode() {
        if (isVoiceMode) {
            stopSpeaking();
            switchToTextMode();
        } else {
            switchToVoiceMode();
        }
    }

async function loadVoices() {
    const res = await fetch("/get_tts_voices");
    const data = await res.json();

    const select = document.getElementById("voiceSelect");
    select.innerHTML = "";

    data.available.forEach(voice => {
        const opt = document.createElement("option");
        opt.value = voice;
        opt.textContent = voice;
        if (voice === data.selected) {
            opt.selected = true;
        }
        select.appendChild(opt);
    });
}

loadVoices();


    async function setupMicrophone() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: {
                echoCancellation: true, 
                noiseSuppression: true 
            } });
            console.log("Microphone access granted.");
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 2048; 
            
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = onAudioProcess;

            startListeningLoop();
        } catch (err) {
            console.error("Microphone access denied:", err);
            document.getElementById("status").textContent = "❌ Microphone access denied.";
            document.getElementById("mic-indicator").style.display = "none";
        }
    }
   
    function stopListeningLoop() {
        if (listenTimeout) clearTimeout(listenTimeout);
        if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();

        // Cleanup audio context resources
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        recordingActive = false;
        silenceTimer = 0;
    }
    document.addEventListener('DOMContentLoaded', function() {
    const settingsBtn = document.getElementById('settingsBtn');
    const dropdown = document.getElementById('settings-dropdown');
    const body = document.body;

    settingsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        dropdown.classList.toggle('show');
        body.classList.toggle('settings-open');
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function() {
        dropdown.classList.remove('show');
        body.classList.remove('settings-open');
    });

    dropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });
});

    // VAD Logic Handler
    function onAudioProcess(event) {
        if (!keepRunning || !isVoiceMode) return;

        // Get the audio data buffer
        const buffer = event.inputBuffer.getChannelData(0);
        let maxVolume = 0;
        
        // Calculate max amplitude (volume) in the buffer
        for (let i = 0; i < buffer.length; i++) {
            maxVolume = Math.max(maxVolume, Math.abs(buffer[i]));
        }

        // --- VAD DECISION ---
        if (maxVolume > SILENCE_THRESHOLD) {
            // SPEECH DETECTED
            silenceTimer = 0;
            if (!recordingActive) {
                // START RECORDING on first speech detection
                recordingActive = true;
                startMediaRecorder();
                document.getElementById("status").textContent = "🔴 Recording...";
                document.getElementById("mic-indicator").classList.add('recording');
            }
        } else {
            // SILENCE DETECTED
            if (recordingActive) {
                silenceTimer += (event.inputBuffer.duration * 1000); // Add duration of the buffer
                
                if (silenceTimer >= SILENCE_DURATION) {
                    // STOP RECORDING: Silence limit reached
                    console.log("Stopping recording due to silence.");
                    stopMediaRecorder();
                    document.getElementById("mic-indicator").classList.remove('recording');
                    return; // Stop processing further chunks until the next loop starts
                }
            }
        }
        
        // Update status for user feedback (only if recording is active)
        if (recordingActive) {
             const timeRemaining = Math.max(0, SILENCE_DURATION - silenceTimer) / 1000;
            document.getElementById("countdown").style.display = "none";
        } else {
             document.getElementById("countdown").style.display = "none";
        }
    }
    
    // Function to start the MediaRecorder, called only when speech is first detected
    function startMediaRecorder() {
        if (mediaRecorder && mediaRecorder.state === 'recording') return;
        
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = (event) => { audioChunks.push(event.data); };
        
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            sendAudioToServer(audioBlob, "/check_wake_word");
        };

        mediaRecorder.start();
    }
    
    // Function to stop the MediaRecorder, called when silence limit is reached
    function stopMediaRecorder() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
        recordingActive = false;
        silenceTimer = 0;
    }


    // The main listening loop now simply resets the state and waits for the next command
    function startListeningLoop() {
        if (!keepRunning) {
            document.getElementById("status").textContent = "Listening is paused.";
            document.getElementById("mic-indicator").style.display = "none";
            return;
        }

        document.getElementById("mic-indicator").style.display = "none";
        document.getElementById("status").textContent = "🎤 Please Speak Your Query ";
        document.getElementById("countdown").style.display = "none";
        
        // Reset VAD state for the next command
        recordingActive = false;
        silenceTimer = 0;
        
        // The VAD logic in onAudioProcess will start/stop the recorder
    }
    
    
    // --- OLLAMA STATUS CHECKING ---
    let isOllamaRunning = false;
    const ollamaBtn = document.getElementById("ollamaStatusBtn");
    function updateOllamaButton(status) {
        ollamaBtn.classList.remove('running', 'stopped');
        if (status === 'running') {
            isOllamaRunning = true;
            ollamaBtn.classList.add('running');
            ollamaBtn.innerText = "Ollama: Running (Click to Stop)";
        } else if (status === 'stopped') {
            isOllamaRunning = false;
            ollamaBtn.classList.add('stopped');
            ollamaBtn.innerText = "Ollama: Stopped (Click to Start)";
        } else {
            isOllamaRunning = false;
            ollamaBtn.innerText = "Ollama: Status Unknown";
        }
    }

    async function checkOllamaStatus() {
        try {
            const response = await fetch('/ollama_status');
            const data = await response.json();
            updateOllamaButton(data.status);
        } catch (error) {
            console.error("Failed to check Ollama status:", error);
            updateOllamaButton('unknown');
        }
    }
    async function toggleOllama() {
        ollamaBtn.disabled = true; 
        ollamaBtn.innerText = isOllamaRunning ? "Stopping..." : "Starting...";

        const action = isOllamaRunning ? 'stop' : 'start';
        const endpoint = `/ollama_control?action=${action}`;
        try {
            const response = await fetch(endpoint, { method: 'POST' });
            const data = await response.json();

            if (data.status === 'success') {
                // Wait a moment for the server process to settle before checking again
                setTimeout(checkOllamaStatus, 2000); 
            } else {
                alert(`Ollama failed to ${action}: ${data.error || 'Unknown error'}`);
                checkOllamaStatus(); // Revert to previous state
            }
        } catch (error) {
            console.error(`Error controlling Ollama: ${error}`);
            alert(`Communication error: Could not connect to backend to ${action} Ollama.`);
            checkOllamaStatus(); // Revert to previous state
        } finally {
            ollamaBtn.disabled = false;
        }
    }

    // --- WEBCAM/IMAGE DESCRIPTION ---
    let webcamStream = null;

    function startWebcam() {
        const video = document.getElementById('webcamVideo');
        if (webcamStream) {
            webcamStream.getTracks().forEach(track => track.stop());
            webcamStream = null;
            video.srcObject = null;
            document.getElementById('imageStatus').innerText = "Webcam stopped.";
        } else {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    webcamStream = stream;
                    video.srcObject = stream;
                    document.getElementById('imageStatus').innerText = "Webcam active. Ready to capture.";
                })
                .catch(err => {
                    console.error("Webcam access error:", err);
                    document.getElementById('imageStatus').innerText = "❌ Webcam access denied.";
                });
        }
    }
    function captureAndDescribe() {
        if (!webcamStream) {
            alert("Please start the webcam first.");
            return;
        }
        const captureBtn = document.querySelector('button[onclick="captureAndDescribe()"]'); 
        captureBtn.disabled = true;
        captureBtn.innerText = "⏳ Processing...";
        const video = document.getElementById('webcamVideo');
        const canvas = document.getElementById('webcamCanvas');
        const context = canvas.getContext('2d');
        
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(blob => {
            if (blob) {
                sendImageForDescription(blob);
            } else {
                document.getElementById('imageStatus').innerText = "Error capturing image.";
            }
        }, 'image/jpeg', 0.9);
    }

    function sendImageForDescription(imageBlob) {
        const promptText = document.getElementById('imagePrompt').value;
        document.getElementById('imageStatus').innerText = "🚀 Sending image for description...";
        const captureBtn = document.querySelector('button[onclick="captureAndDescribe()"]');
        const formData = new FormData();
        formData.append("image", imageBlob, "captured_image.jpg");
        formData.append("prompt", promptText || 'Describe this image in detail.');

        fetch('/describe_image', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(d => {
            const imageResponseContainer = document.getElementById("imageDescriptionResponse");
            document.getElementById('imageStatus').innerText = "✅ Description complete.";
            if (d.response) {
                imageResponseContainer.innerHTML = d.response;
            } else {
            imageResponseContainer.innerText = "Error: " + (d.error || "No response received from model.")
            }
        })
        .catch(err => {
            console.error("Error describing image:", err);
            document.getElementById('imageStatus').innerText = "❌ Failed to connect to server for description.";
        });
    }

    // --- AUDIO SENDING AND PROCESSING  ---
    function sendAudioToServer(audioBlob, route) {
        document.getElementById("mic-indicator").style.display = "none";
        document.getElementById("status").textContent = "🚀 Getting Your Response";

        const formData = new FormData();
        formData.append("audio_file", audioBlob, "recorded.webm");
        requestStartTime = performance.now();
        fetch(route, { method: "POST", body: formData })
            .then(res => res.json())
            .then(data => {
                const transcription = data.transcription || "";
                const timeTaken = ((performance.now() - requestStartTime) / 1000).toFixed(2);
                document.getElementById("text").textContent = transcription;
                
                if (transcription === "") {
                    document.getElementById("status").textContent = "👂 Just listening...";
                    setTimeout(startListeningLoop, 500);
                    return;
                }
                
                if(!data.wake_word_detected) {
                    document.getElementById("status").textContent = "👂 Just listening...";
                    document.getElementById("text").innerHTML = "";
                    setTimeout(startListeningLoop, 500);
                    return;
                }

                // If wake word is detected and response exists
                if (isVoiceMode && data.response !== undefined) {
                    appendMessage("user", transcription);
                    document.getElementById("response").innerHTML = "";
                    document.getElementById("response-voice").innerHTML = data.response;
                    appendMessage("assistant", data.response);
                    appendResponseTime(timeTaken);
                    setTimeout(startListeningLoop,2000); 
                    
                } else if (!isVoiceMode && data.response !== undefined) {
                    document.getElementById("response").innerHTML = data.response;
                    setTimeout(startListeningLoop, 500);
                }

                if (data.stop_detected) {
                    keepRunning = true;
                    document.getElementById("response-voice").innerHTML = "";
                    document.getElementById("status").textContent = "🛑 Stopped. Listening again…";
                    setTimeout(startListeningLoop, 500);
                } else {
                    document.getElementById("status").textContent = "✅ Ready for your next command.";
                    setTimeout(startListeningLoop, 500);
                }
            })
            .catch(err => {
                console.error("Error sending audio:", err);
                document.getElementById("status").textContent = "❌ Error: " + err.message;
                setTimeout(startListeningLoop, 800);
            });
    }
    function setModel() {
    const selectedModel = document.getElementById("modelSelect").value;

    fetch("/set_ollama_model", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ model_name: selectedModel })
    })
    .then(response => response.json())
    .then(data => {
        console.log("Model successfully set to:", data.selected_model);
    })
    .catch(error => {
        console.error("Failed to set model globally:", error);
    });
}
document.addEventListener('DOMContentLoaded', () => {
    setModel(); // Set the currently selected model on load
});
    // --- FILE/DOCUMENT/TEXT MODE FUNCTIONS ---
    function rememberText() {
        let userInput = document.getElementById("rememberInput").value;
        if (!userInput.trim()) { alert("Please enter some text to remember!"); return; }
        fetch('/remember', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: userInput })
        })
        .then(r => r.json())
        .then(d => { document.getElementById("rememberResponse").innerText = d.message || "Error saving text!"; })
        .catch(() => { document.getElementById("rememberResponse").innerText = "Failed to save text."; });
    }
    function appendResponseTime(seconds) {
    const chatBox = document.getElementById("chatBox");
    const timeDiv = document.createElement("div");
    timeDiv.style.fontSize = "0.8rem";
    timeDiv.style.color = "#9e9e9e";
    timeDiv.style.marginLeft = "10px";
    timeDiv.innerText = `⏱ Response time: ${seconds} s`;
    chatBox.appendChild(timeDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

    function fetchUploadedFiles() {
        fetch("/list_documents")
            .then(r => r.json())
            .then(data => {
                const fileList = document.getElementById("fileList");
                fileList.innerHTML = "";
                (data.files || []).forEach(file => {
                    const li = document.createElement("li");
                    const link = document.createElement("a");
                    link.href = `/uploads/${encodeURIComponent(file)}`;
                    link.innerText = file; link.target = "_blank";
                    const del = document.createElement("button");
                    del.innerHTML = "🗑️"; del.style.marginLeft = "10px";
                    del.onclick = () => { if (confirm(`Delete ${file}?`)) deleteFile(file); };
                    li.appendChild(link); li.appendChild(del);
                    fileList.appendChild(li);
                });
            })
            .catch(console.error);
    }
    function deleteFile(filename) {
        fetch("/delete_document", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filename })
        })
        .then(r => r.json())
        .then(data => { alert(data.message || data.error); fetchUploadedFiles(); })
        .catch(() => alert("Failed to delete the file."));
    }

    function clearFile() {
        const fileInput = document.getElementById("docInput");
        fileInput.value = '';
        document.getElementById("rememberResponse").innerText = "File deselected.";
    }

    function uploadDocument() {
        const fileInput = document.getElementById("docInput");
        const file = fileInput.files[0];
        if (!file) { alert("Please select a file to upload."); return; }
        const ext = file.name.toLowerCase().split('.').pop();
        if (!['pdf','docx'].includes(ext)) { alert("Please upload a valid PDF or DOCX file."); return; }

        const formData = new FormData();
        formData.append("file", file);
        fetch("/upload_document", { method: "POST", body: formData })
            .then(r => r.json())
            .then(d => { document.getElementById("rememberResponse").innerText = d.message || d.error; fetchUploadedFiles(); })
            .catch(() => { document.getElementById("rememberResponse").innerText = "Failed to upload."; });
    }
    function askModel() {
        let userInput = document.getElementById("userInput").value;
        let selectedModel = document.getElementById("modelSelect").value;
        if (!userInput.trim()) { alert("Please enter a question!"); return; }
        appendMessage("user", userInput);
        document.getElementById("userInput").value = "Asking..."; // Show processing status
        requestStartTime = performance.now();
        fetch(`/askmodel?text=${encodeURIComponent(userInput)}&model=${encodeURIComponent(selectedModel)}`)
            .then(r => r.json())
            .then(d => {
                let response = d.response || "No response received";
                const timeTaken = ((performance.now() - requestStartTime) / 1000).toFixed(2);
                document.getElementById("response").innerHTML = response;
                appendMessage("assistant", response);
                appendResponseTime(timeTaken);
                document.getElementById("userInput").value = ""; // Clear input after successful query
            })
            .catch(() => { 
                document.getElementById("response").innerText = "Error getting response";
                document.getElementById("userInput").value = userInput; // Restore input on error
            });
    }
    function stopSpeaking() {
        fetch('/stop_tts', {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => console.log(data.message))
        .catch(error => console.error("Error stopping speech:", error));
    }
    function changeWakeWord() {
    const new_word = document.getElementById("wakeWordSelect").value;

    fetch("/set_wake_word", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wake_word: new_word })
    })
    .then(res => res.json())
    .then(data => {
        addToChat("ai", "Wake word updated to: " + data.selected);
    });
}
    function appendMessage(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const msgWrapper = document.createElement("div"); // Outer container (for alignment)
        const msgContent = document.createElement("span"); // Inner bubble (for background/shape)
        
        let htmlText = text;
        htmlText = htmlText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        htmlText = htmlText.replace(/\n/g, '<br>');

        if (sender === "user") {
            msgWrapper.classList.add("user-message-wrapper");
        msgContent.innerHTML = `<span class="user-message">You:</span> ${htmlText}`;
        } else {
           msgWrapper.classList.add("assistant-message-wrapper");
        msgContent.innerHTML = `<span class="assistant-message">Response:</span> ${htmlText}`;
        }
        
        msgWrapper.appendChild(msgContent);
        chatBox.appendChild(msgWrapper);
        
        // Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    document.getElementById("voiceSelect").addEventListener("change", async function () {
    const voice = this.value;

    await fetch("/set_tts_voice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ voice })
    });
});
    window.onload = function () {
        switchToVoiceMode();
        fetchUploadedFiles();
        checkOllamaStatus();
        fetch("/get_wake_words")
        .then(res => res.json())
        .then(data => {
            let ddl = document.getElementById("wakeWordSelect");

            data.available.forEach(w => {
                let opt = document.createElement("option");
                opt.value = w;
                opt.textContent = w.charAt(0).toUpperCase() + w.slice(1);
                if (w === data.selected) opt.selected = true;
                ddl.appendChild(opt);
            });
        });
    };
</script>
